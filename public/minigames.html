<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>미니게임 대결</title>
<style>
  :root {
    --bg: #0e1016; --bg-glow: #1a1f2e;
    --surface: #181b25; --surface-2: #20242f;
    --line: #2a2f3d; --line-strong: #3a4150;
    --text: #f4f6fc; --muted: #9aa0b4;
    --accent: #ffd23f; --accent-2: #ffb01f; --accent-ink: #1a1500;
    --red: #ef4444; --green: #22c55e;
    --radius: 20px; --radius-sm: 13px;
    --shadow: 0 10px 34px rgba(0,0,0,.38); --shadow-sm: 0 2px 10px rgba(0,0,0,.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    color: var(--text); -webkit-font-smoothing: antialiased;
    background: radial-gradient(1100px 540px at 50% -12%, var(--bg-glow), transparent 60%), var(--bg);
    display: flex; flex-direction: column; align-items: center; min-height: 100%; padding: 22px 16px 30px;
  }
  .wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 18px; flex: 1; }
  h1 { font-size: clamp(1.4rem, 1.1rem + 1.4vw, 1.7rem); font-weight: 900; letter-spacing: -.6px; }
  h1 small { display: block; margin-top: 6px; font-size: .82rem; font-weight: 500; color: var(--muted); letter-spacing: 0; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  label { display: block; font-size: .8rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; letter-spacing: .2px; }
  input {
    width: 100%; padding: 15px 16px; font-size: 1rem; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: #101319; color: var(--text); margin-bottom: 16px;
    transition: border-color .15s, box-shadow .15s;
  }
  input::placeholder { color: #5b6072; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,210,63,.18); }
  button {
    width: 100%; padding: 16px; font-size: 1.05rem; font-weight: 800; border: none; border-radius: var(--radius-sm);
    background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: var(--accent-ink);
    cursor: pointer; box-shadow: var(--shadow-sm); transition: transform .08s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.06); }
  button:active { transform: translateY(1px) scale(.99); }
  button:disabled { opacity: .4; cursor: not-allowed; filter: none; }
  button:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(255,210,63,.4); }
  .hidden { display: none !important; }
  .footnote { color: var(--muted); font-size: .78rem; line-height: 1.55; text-align: center; margin-top: 6px; }
  .roomline { display: flex; justify-content: space-between; align-items: center; color: var(--muted);
    font-size: .85rem; font-weight: 600; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .roomline b { color: var(--accent); font-size: 1.15rem; letter-spacing: 1.5px; }

  /* 게임 선택 */
  .game-picker { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .gamebtn {
    display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto auto; column-gap: 13px;
    align-items: center; text-align: left; background: var(--surface-2); color: var(--text);
    border: 2px solid var(--line); padding: 13px 15px; border-radius: var(--radius-sm);
    transition: border-color .15s, transform .08s, background .15s;
  }
  .gamebtn:hover:not(:disabled) { border-color: var(--line-strong); transform: translateY(-1px); }
  .gamebtn.active { border-color: var(--accent); background: rgba(255,210,63,.08); }
  .gamebtn .ge { grid-row: 1 / 3; width: 44px; height: 44px; display: grid; place-items: center;
    background: #101319; border-radius: 12px; color: var(--accent); }
  .gamebtn .gn { font-weight: 800; font-size: 1.05rem; }
  .gamebtn small { color: var(--muted); font-weight: 500; }

  .players { list-style: none; display: flex; flex-direction: column; gap: 8px; margin: 0 0 18px; }
  .players li { display: flex; align-items: center; gap: 10px; padding: 13px 15px; background: var(--surface-2);
    border-radius: var(--radius-sm); font-weight: 600; }
  .players li .tag { margin-left: auto; font-size: .7rem; color: var(--accent-ink); background: var(--accent);
    padding: 3px 9px; border-radius: 99px; font-weight: 800; }
  .players li.me { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* 게임 화면 공용 */
  .roundpill { align-self: center; font-size: .9rem; font-weight: 800; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--line); padding: 9px 18px; border-radius: 99px;
    box-shadow: var(--shadow-sm); }
  #gamebody { flex: 1; display: flex; flex-direction: column; }

  /* 카운트다운 */
  .countdown { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 340px; }
  .cd-num { font-size: clamp(5rem, 3rem + 10vw, 9rem); font-weight: 900; color: var(--accent); line-height: 1;
    text-shadow: 0 6px 40px rgba(255,210,63,.3); animation: cdpop .45s cubic-bezier(.16,1,.3,1); }
  @keyframes cdpop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* 반응속도 */
  #stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 24px; padding: 28px; text-align: center; user-select: none; min-height: 340px;
    transition: background .04s ease; cursor: pointer; box-shadow: var(--shadow); }
  #stage.idle { background: var(--surface); cursor: default; }
  #stage.armed { background: radial-gradient(circle at 50% 38%, #f04848, #c62f2f); }
  #stage.go { background: radial-gradient(circle at 50% 38%, #2fd673, #1aa657); }
  #stage .big { font-size: clamp(2rem, 1.4rem + 3vw, 2.8rem); font-weight: 900; letter-spacing: -1px; }
  #stage .sub { font-size: 1rem; opacity: .92; margin-top: 12px; font-weight: 500; }
  #stage .ms { font-family: ui-monospace, Menlo, monospace; font-size: clamp(2.6rem, 2rem + 3vw, 3.4rem);
    font-weight: 800; color: var(--accent); }

  /* 초성 퀴즈 */
  .quiz-hint { font-size: clamp(3rem, 2rem + 6vw, 4.2rem); font-weight: 900; letter-spacing: 10px;
    text-align: center; margin: 30px 0 8px; color: var(--accent); text-shadow: 0 4px 24px rgba(255,210,63,.22); }
  .quiz-cat { text-align: center; color: var(--muted); margin-bottom: 18px; font-weight: 600; font-size: .92rem; }
  .feed { flex: 1; overflow-y: auto; background: #101319; border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 12px; margin-top: 14px; min-height: 130px; display: flex; flex-direction: column; gap: 6px; }
  .feedline { font-size: .92rem; color: var(--muted); }
  .feedline.correct { color: var(--green); font-weight: 800; }

  /* 결과 */
  .winner { font-size: clamp(1.3rem, 1.1rem + 1.5vw, 1.6rem); font-weight: 900; color: var(--accent);
    margin-bottom: 18px; text-align: center; text-shadow: 0 2px 16px rgba(255,210,63,.28); }
  .result-list { list-style: none; display: flex; flex-direction: column; gap: 9px; width: 100%; }
  .result-list li { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface-2);
    border-radius: var(--radius-sm); }
  .result-list li:first-child { background: linear-gradient(180deg, rgba(255,210,63,.14), rgba(255,210,63,.04));
    border: 1px solid rgba(255,210,63,.3); }
  .result-list li.me { outline: 2px solid var(--accent); outline-offset: -2px; }
  .result-list .rank { font-weight: 900; min-width: 30px; text-align: center; font-size: 1.05rem; color: var(--muted); }
  .result-list li:nth-child(1) .rank { color: var(--accent); }
  .result-list li:nth-child(2) .rank { color: #cfd3df; }
  .result-list li:nth-child(3) .rank { color: #d7a878; }
  .result-list .nm { font-weight: 700; font-size: 1rem; }
  .result-list .val { margin-left: auto; font-family: ui-monospace, monospace; font-weight: 800; font-size: 1.05rem; }
  .result-list .bad { margin-left: auto; color: #ff8a8a; font-size: .82rem; font-weight: 700; }
  .conn-warn { color: #ff8a8a; font-size: .8rem; line-height: 1.55; text-align: center; margin-top: 10px; }
  @media (prefers-reduced-motion: reduce) { *, ::before, ::after { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>미니게임 대결 <small>같은 방에 모여서 한판 붙기</small></h1>

  <!-- 1) 입장 -->
  <div id="screen-join" class="card">
    <label>닉네임</label>
    <input id="nickname" maxlength="12" placeholder="예: 번개손" />
    <label>방 코드 (같은 코드끼리 대결 · 비우면 lobby)</label>
    <input id="roomCode" maxlength="16" placeholder="lobby" />
    <button id="btnJoin">입장하기</button>
    <p class="footnote">친구랑 하려면 같은 방 코드를 공유하세요.</p>
    <p id="connWarn" class="conn-warn hidden"></p>
  </div>

  <!-- 2) 대기실 -->
  <div id="screen-lobby" class="card hidden">
    <div class="roomline">방 코드 <b id="roomLabel">lobby</b></div>
    <label>게임 선택 <span id="pickerHint" class="footnote" style="display:inline"></span></label>
    <div id="gamePicker" class="game-picker"></div>
    <label>참가자</label>
    <ul id="playerList" class="players"></ul>
    <button id="btnStart" class="hidden">대결 시작 (방장)</button>
    <p id="waitMsg" class="footnote">방장이 시작하길 기다리는 중…</p>
  </div>

  <!-- 3) 게임 -->
  <div id="screen-game" class="hidden" style="flex:1; display:flex; flex-direction:column; gap:12px;">
    <div class="roundpill" id="roundPill"></div>
    <div id="gamebody"></div>
  </div>

  <!-- 4) 결과 -->
  <div id="screen-result" class="card hidden">
    <div id="resultTitle" class="winner"></div>
    <ul id="resultList" class="result-list"></ul>
    <div id="resultActions" style="margin-top:16px; display:flex; flex-direction:column; gap:10px;"></div>
  </div>
</div>

<script>
// ====== 게임 서버 주소 ======
// Render에 server.js를 배포한 뒤, 받은 주소로 아래 값을 바꾸세요. (예: wss://mini-games-xxxx.onrender.com)
const GAME_SERVER = 'wss://mini-games-czlk.onrender.com';
function gameServerUrl() {
  const h = location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return 'ws://localhost:3000'; // 로컬 개발용
  return GAME_SERVER;
}

// 게임 아이콘 (이모지 대신 인라인 SVG)
const ICONS = {
  reaction: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h7l-1 8 8-12h-7z"/></svg>',
  chosung: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8M8 13h5"/></svg>',
};

const $ = (id) => document.getElementById(id);
const screens = { join: $('screen-join'), lobby: $('screen-lobby'), game: $('screen-game'), result: $('screen-result') };
function show(name) { for (const k in screens) screens[k].classList.toggle('hidden', k !== name); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

let ws = null;
let me = { id: null, isHost: false };
let gamesCatalog = [];
let selectedGameId = null;
let currentGame = { id: null, name: '' };
let curRound = 0;
let gameInited = false;

// ---- 입장 ----
$('btnJoin').onclick = () => {
  const nickname = $('nickname').value.trim() || '익명';
  const roomCode = $('roomCode').value.trim() || 'lobby';
  $('connWarn').classList.add('hidden');
  try {
    ws = new WebSocket(gameServerUrl());
  } catch (e) {
    return showConnWarn();
  }
  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', nickname, roomCode }));
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onerror = () => showConnWarn();
  ws.onclose = () => { if (currentGame.id || selectedGameId) alert('서버 연결이 끊겼어요. 새로고침 해주세요.'); };
};
function showConnWarn() {
  $('connWarn').textContent = '게임 서버에 연결할 수 없어요. 서버가 켜져 있는지 확인하세요. (무료 서버는 첫 접속 시 깨어나는 데 30~60초 걸릴 수 있어요)';
  $('connWarn').classList.remove('hidden');
}
$('btnStart').onclick = () => ws.send(JSON.stringify({ type: 'start' }));

// ---- 서버 메시지 라우팅 ----
function handle(m) {
  switch (m.type) {
    case 'joined':
      me.id = m.playerId; me.isHost = m.isHost;
      gamesCatalog = m.games; selectedGameId = m.gameId;
      $('roomLabel').textContent = m.roomCode;
      show('lobby'); renderLobby([], m.state);
      break;
    case 'players':
      selectedGameId = m.gameId;
      renderLobby(m.players, m.state);
      break;
    case 'match_start':
      currentGame = { id: m.gameId, name: m.name }; curRound = 0; gameInited = false;
      show('game'); $('roundPill').textContent = `${m.name} · 곧 시작!`;
      $('gamebody').innerHTML = '';
      break;
    case 'countdown':
      show('game');
      $('gamebody').innerHTML = `<div class="countdown"><div class="cd-num">${m.n > 0 ? m.n : '시작!'}</div></div>`;
      break;
    case 'round_result': showRoundResult(m); break;
    case 'match_over': showFinal(m.ranking); break;
    case 'back_to_lobby': show('lobby'); break;
    default:
      show('game');
      if (renderers[currentGame.id]) {
        if (!gameInited) { renderers[currentGame.id].init(); gameInited = true; }
        renderers[currentGame.id].onMessage(m);
      }
  }
}

// ---- 대기실 ----
function renderLobby(players, state) {
  const me2 = players.find((p) => p.id === me.id);
  if (me2) me.isHost = me2.isHost;

  const picker = $('gamePicker'); picker.innerHTML = '';
  gamesCatalog.forEach((g) => {
    const b = document.createElement('button');
    b.className = 'gamebtn' + (g.id === selectedGameId ? ' active' : '');
    b.innerHTML = `<span class="ge">${ICONS[g.id] || ''}</span><span class="gn">${escapeHtml(g.name)}</span><small>${escapeHtml(g.description)}</small>`;
    b.disabled = !me.isHost;
    b.onclick = () => ws.send(JSON.stringify({ type: 'select_game', gameId: g.id }));
    picker.appendChild(b);
  });
  $('pickerHint').textContent = me.isHost ? '(방장이 고르세요)' : '(방장이 고르는 중)';

  const ul = $('playerList'); ul.innerHTML = '';
  players.forEach((p) => {
    const li = document.createElement('li');
    if (p.id === me.id) li.classList.add('me');
    li.innerHTML = `<span>${escapeHtml(p.nickname)}</span>` + (p.isHost ? `<span class="tag">방장</span>` : '');
    ul.appendChild(li);
  });

  const canStart = me.isHost && (state === 'waiting' || state === 'finished');
  $('btnStart').classList.toggle('hidden', !canStart);
  $('waitMsg').classList.toggle('hidden', canStart);
  $('btnStart').textContent = players.length > 1 ? '대결 시작 (방장)' : '대결 시작 (혼자 연습)';
}

function setRoundPill(m) { $('roundPill').textContent = `${currentGame.name} · 라운드 ${m.round} / ${m.totalRounds}`; }

// ============ 게임 렌더러 ============
const renderers = {
  reaction: {
    st: {},
    init() {
      $('gamebody').innerHTML = `<div id="stage" class="idle"><div class="big" id="stageMain">곧 시작합니다</div><div class="sub" id="stageSub"></div></div>`;
      $('stage').addEventListener('pointerdown', (e) => { e.preventDefault(); renderers.reaction.press(); });
    },
    onMessage(m) {
      if (m.type === 'round_arm') {
        curRound = m.round; setRoundPill(m); this.st = { phase: 'armed', clicked: false };
        setStage('armed', '준비…', '초록으로 바뀌면! (미리 누르면 실격)');
      } else if (m.type === 'round_go') {
        this.st.phase = 'go'; this.st.t0 = performance.now();
        setStage('go', '지금!', '클릭 / 스페이스');
      }
    },
    press() {
      const st = this.st || {};
      if (st.phase === 'armed') {
        st.phase = 'waiting';
        ws.send(JSON.stringify({ type: 'click', round: curRound, falseStart: true }));
        setStage('idle', '너무 빨랐어요!', '이번 라운드는 패널티…');
      } else if (st.phase === 'go' && !st.clicked) {
        st.clicked = true;
        const r = Math.round(performance.now() - st.t0); st.phase = 'waiting';
        ws.send(JSON.stringify({ type: 'click', round: curRound, reactionMs: r }));
        setStage('idle', `${r}ms`, '다른 사람 기다리는 중…');
        $('stageMain').className = 'ms';
      }
    },
  },
  chosung: {
    init() {
      $('gamebody').innerHTML =
        `<div class="quiz-hint" id="quizHint">준비 중…</div>
         <div class="quiz-cat" id="quizCat"></div>
         <form id="guessForm" autocomplete="off"><input id="guessInput" placeholder="정답 입력 후 Enter" maxlength="20" disabled /></form>
         <div class="feed" id="feed"></div>`;
      $('guessForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const t = $('guessInput').value;
        if (t.trim()) ws.send(JSON.stringify({ type: 'guess', round: curRound, text: t }));
        $('guessInput').value = '';
      });
    },
    onMessage(m) {
      if (m.type === 'quiz_question') {
        curRound = m.round; setRoundPill(m);
        $('quizHint').textContent = m.hint;
        $('quizCat').textContent = `힌트: ${m.category} · ${m.length}글자 · ${Math.round(m.timeMs / 1000)}초 안에`;
        $('feed').innerHTML = '';
        const inp = $('guessInput'); inp.disabled = false; inp.value = ''; inp.focus();
      } else if (m.type === 'quiz_guess') {
        addFeed(`${m.nickname}: ${m.text}`, false);
      } else if (m.type === 'quiz_correct') {
        addFeed(`정답! ${m.nickname} (${m.answer})`, true);
        $('guessInput').disabled = true;
      }
    },
  },
};

function setStage(cls, main, sub) {
  const s = $('stage'); if (!s) return;
  s.className = cls;
  $('stageMain').className = 'big';
  $('stageMain').textContent = main;
  $('stageSub').textContent = sub;
}
function addFeed(text, correct) {
  const f = $('feed'); if (!f) return;
  const d = document.createElement('div');
  d.className = 'feedline' + (correct ? ' correct' : '');
  d.textContent = text;
  f.appendChild(d); f.scrollTop = f.scrollHeight;
}

window.addEventListener('keydown', (e) => {
  if (e.code !== 'Space') return;
  if (currentGame.id === 'reaction' && !screens.game.classList.contains('hidden')) {
    e.preventDefault(); renderers.reaction.press();
  }
});

// ---- 결과 ----
function unit() { return currentGame.id === 'reaction' ? 'ms' : '점'; }

function showRoundResult(m) {
  show('result');
  $('resultTitle').textContent = (currentGame.id === 'chosung' && m.answer)
    ? `라운드 ${m.round} · 정답: ${m.answer}` : `라운드 ${m.round} 결과`;
  const ul = $('resultList'); ul.innerHTML = '';
  m.results.forEach((r, i) => {
    const li = document.createElement('li');
    if (r.id === me.id) li.classList.add('me');
    let val;
    if (currentGame.id === 'reaction') {
      val = r.falseStart ? '<span class="bad">부정출발</span>'
        : r.noClick ? '<span class="bad">미클릭</span>'
        : `<span class="val">${r.reactionMs}ms</span>`;
    } else {
      val = r.gained > 0 ? `<span class="val">+${r.gained}</span>` : '<span class="bad">-</span>';
    }
    li.innerHTML = `<span class="rank">${i + 1}</span><span class="nm">${escapeHtml(r.nickname)}</span>${val}`;
    ul.appendChild(li);
  });
  $('resultActions').innerHTML = '';
  const lead = m.totals[0];
  const note = document.createElement('p'); note.className = 'footnote';
  note.textContent = `누적 1위: ${lead.nickname} (${lead.total}${unit()}) · 다음 라운드 곧…`;
  $('resultActions').appendChild(note);
}

function showFinal(ranking) {
  show('result');
  $('resultTitle').textContent = `우승 · ${ranking[0].nickname}`;
  const ul = $('resultList'); ul.innerHTML = '';
  ranking.forEach((r, i) => {
    const li = document.createElement('li');
    if (r.id === me.id) li.classList.add('me');
    li.innerHTML = `<span class="rank">${i + 1}</span><span class="nm">${escapeHtml(r.nickname)}</span><span class="val">${r.total}${unit()}</span>`;
    ul.appendChild(li);
  });
  const actions = $('resultActions'); actions.innerHTML = '';
  if (me.isHost) {
    const btn = document.createElement('button');
    btn.textContent = '대기실로 (다시 하기)';
    btn.onclick = () => ws.send(JSON.stringify({ type: 'rematch' }));
    actions.appendChild(btn);
  } else {
    const p = document.createElement('p'); p.className = 'footnote';
    p.textContent = '방장이 다시 시작하길 기다리는 중…';
    actions.appendChild(p);
  }
}
</script>
</body>
</html>
